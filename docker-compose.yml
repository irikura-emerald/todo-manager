services:
    app:
        build:
            context: .
            dockerfile: Dockerfile
            args:
                - APP_NAME=${APP_NAME}
        ports:
            - 3000:3000
            - 5555:5555
        environment:
            - DATABASE_URL=${DATABASE_URL}
            - REDIS_URL=${REDIS_URL}
            - TZ=Asia/Tokyo
            - AUTH_SECRET=${AUTH_SECRET}
        volumes:
            - ./app:/app/${APP_NAME}/app
            - ./lib:/app/${APP_NAME}/lib
            - ./components:/app/${APP_NAME}/components
            - ./validation:/app/${APP_NAME}/validation
            - ./auth.ts:/app/${APP_NAME}/auth.ts
            - /app/${APP_NAME}/app/generated
        depends_on:
            - postgres
            - redis

    postgres:
        image: postgres:18.4
        environment:
            - POSTGRES_USER=${POSTGRES_USER}
            - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
            - POSTGRES_DB=${POSTGRES_DB}
            - TZ=Asia/Tokyo
        ports:
            - 5432:5432
        restart: always
        volumes:
            - pg-data:/var/lib/postgresql

    redis:
        image: redis:8.8.0
        ports:
            - 6379:6379
        volumes:
            - redis-data:/data

volumes:
    pg-data:
    redis-data:
